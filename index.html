<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Alisson klk manito</title>

<style>
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: "Helvetica Neue", Arial, sans-serif;
  background: #faf7f8;
  color: #333;
}

.card {
  background: white;
  padding: 50px 40px;
  border-radius: 18px;
  box-shadow: 0 20px 40px rgba(0,0,0,0.08);
  text-align: center;
  max-width: 360px;
}

h1 {
  font-size: 24px;
  font-weight: 500;
  margin-bottom: 40px;
}

.buttons {
  position: relative;
  height: 120px;
}

button {
  font-size: 16px;
  padding: 12px 28px;
  border-radius: 999px;
  border: none;
  cursor: pointer;
  transition: transform 0.2s ease;
}

#yes {
  background: #111;
  color: white;
}

#yes:hover {
  transform: scale(1.05);
}

#no {
  position: absolute;
  background: #e5e5e5;
  color: #666;
  left: 140px;
  top: 60px;
}
</style>
</head>

<body>

<div class="card">
  <h1>¿Me compras una papipollo de las que venden por la poli?</h1>

  <div class="buttons">
    <button id="yes">Sí</button>
    <button id="no">No</button>
  </div>
</div>

<script>
const noBtn = document.getElementById("no");
const container = document.querySelector(".buttons");

function moveNoButton() {
  const containerRect = container.getBoundingClientRect();
  const btnRect = noBtn.getBoundingClientRect();

  const maxX = containerRect.width - btnRect.width;
  const maxY = containerRect.height - btnRect.height;

  const x = Math.random() * maxX;
  const y = Math.random() * maxY;

  noBtn.style.transition = "left 0.25s ease, top 0.25s ease";
  noBtn.style.left = x + "px";
  noBtn.style.top = y + "px";
}

noBtn.addEventListener("mouseenter", moveNoButton);
noBtn.addEventListener("mousemove", moveNoButton);

document.getElementById("yes").addEventListener("click", () => {
  document.body.innerHTML = `
    <div style="
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:40px;
      font-family:'Helvetica Neue', Arial, sans-serif;
      background:#faf7f8;
      color:#111;
    ">
      <div>
        <p style="font-size:22px; line-height:1.6;">
          Ya aceptaste el plan para la papipollo,
        </p>
        <p style="font-size:20px; line-height:1.6; margin-top:20px;">
          miraaaaaaaaa,<br>
          mi dedoooooo<br>
          klk manito.
        </p>
        <p style="margin-top:30px; font-size:18px;">🤍</p>
      </div>
    </div>
  `;
});
</script>

</body>
</html>
